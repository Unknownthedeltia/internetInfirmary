<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>??? — unknown</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#050506;
    --fg:#d7d7d2;
    --acc:#8a1f1f;
    --acc2:#3a3a33;
    --mono: 'Courier New', ui-monospace, monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    width:100%; height:100%;
    background:var(--bg);
    color:var(--fg);
    font-family:var(--mono);
    overflow:hidden;
  }
  #bg-layer{
    position:fixed; inset:0; z-index:0;
    overflow:hidden;
    pointer-events:none;
  }
  .glitch-word{
    position:absolute;
    font-weight:700;
    letter-spacing:0.05em;
    color:var(--acc2);
    opacity:0;
    white-space:nowrap;
    text-shadow: 2px 0 var(--acc), -2px 0 #1f3a3a;
    user-select:none;
  }
  #scene-container{
    position:fixed; inset:0; z-index:1;
  }
  #hud{
    position:fixed; inset:0; z-index:5;
    display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    pointer-events:none;
    padding: 6vh 4vw;
  }
  #hud > *{ pointer-events:auto; }

  header.top{
    text-align:center;
  }
  .tag{
    font-size:0.7rem;
    letter-spacing:0.6em;
    color:var(--acc);
    opacity:0.8;
    text-transform:uppercase;
  }
  .title{
    margin-top:0.6rem;
    font-size:clamp(1.4rem, 3vw, 2.2rem);
    letter-spacing:0.2em;
    color:var(--fg);
    opacity:0.85;
  }
  .title .b{ color:var(--acc); }

  #countdown-wrap{
    text-align:center;
  }
  #countdown{
    display:flex;
    gap:1.4rem;
    justify-content:center;
    margin-bottom:0.8rem;
  }
  .unit{
    display:flex; flex-direction:column; align-items:center;
    min-width:56px;
  }
  .unit .num{
    font-size:clamp(1.6rem,4vw,2.6rem);
    font-weight:700;
    color:var(--fg);
    text-shadow:0 0 12px rgba(138,31,31,0.5);
  }
  .unit .lbl{
    font-size:0.6rem;
    letter-spacing:0.3em;
    color:var(--acc2);
    margin-top:0.2rem;
  }
  #target-date{
    font-size:0.65rem;
    letter-spacing:0.3em;
    color:var(--acc2);
    opacity:0.6;
  }

  #reveal-btn{
    margin-top:1rem;
    display:none;
    padding:0.9rem 2.4rem;
    background:transparent;
    border:1px solid var(--acc);
    color:var(--fg);
    font-family:var(--mono);
    letter-spacing:0.3em;
    font-size:0.8rem;
    cursor:pointer;
    transition:background 0.3s, color 0.3s;
  }
  #reveal-btn:hover{
    background:var(--acc);
    color:#050506;
  }

  footer.bottom{
    width:100%;
    max-width:420px;
    text-align:center;
  }
  #pw-form{
    display:flex;
    border:1px solid var(--acc2);
    background:rgba(10,10,10,0.6);
    backdrop-filter:blur(2px);
  }
  #pw-input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--fg);
    font-family:var(--mono);
    letter-spacing:0.3em;
    padding:0.8rem 1rem;
    font-size:0.85rem;
  }
  #pw-input::placeholder{
    color:#4a4a44;
    letter-spacing:0.2em;
  }
  #pw-submit{
    background:transparent;
    border:none;
    border-left:1px solid var(--acc2);
    color:var(--acc);
    padding:0 1.2rem;
    cursor:pointer;
    font-family:var(--mono);
    letter-spacing:0.2em;
  }
  #pw-submit:hover{ background:var(--acc2); }
  #pw-msg{
    margin-top:0.6rem;
    font-size:0.7rem;
    letter-spacing:0.2em;
    color:var(--acc);
    height:1em;
  }

  #vignette{
    position:fixed; inset:0; z-index:4;
    pointer-events:none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%);
  }
  #scanlines{
    position:fixed; inset:0; z-index:6;
    pointer-events:none;
    opacity:0.06;
    background: repeating-linear-gradient(0deg, #fff 0px, #fff 1px, transparent 2px, transparent 3px);
    mix-blend-mode: overlay;
  }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="scene-container"></div>
<div id="vignette"></div>
<div id="scanlines"></div>

<div id="hud">
  <header class="top">
    <div class="tag">access restricted</div>
    <div class="title">SIGNAL <span class="b">///</span> UNKNOWN</div>
  </header>

  <section id="countdown-wrap">
    <div id="countdown">
      <div class="unit"><span class="num" id="d">00</span><span class="lbl">days</span></div>
      <div class="unit"><span class="num" id="h">00</span><span class="lbl">hrs</span></div>
      <div class="unit"><span class="num" id="m">00</span><span class="lbl">min</span></div>
      <div class="unit"><span class="num" id="s">00</span><span class="lbl">sec</span></div>
    </div>
    <div id="target-date">until 2027.06.01 00:00</div>
    <button id="reveal-btn">ENTER</button>
  </section>

  <footer class="bottom">
    <form id="pw-form" autocomplete="off">
      <input id="pw-input" type="text" placeholder="access code" autocomplete="off">
      <button id="pw-submit" type="submit">→</button>
    </form>
    <div id="pw-msg"></div>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
/* ---------------- Three.js rotating cube ---------------- */
const container = document.getElementById('scene-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 4.2;

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const light = new THREE.AmbientLight(0xffffff, 1);
scene.add(light);

const loader = new THREE.TextureLoader();
const texture = loader.load('what.png');
if (THREE.SRGBColorSpace) texture.colorSpace = THREE.SRGBColorSpace;

const materials = new Array(6).fill(0).map(() => new THREE.MeshBasicMaterial({ map: texture }));

const geometry = new THREE.BoxGeometry(1.6, 1.6, 1.6);
const cube = new THREE.Mesh(geometry, materials);
scene.add(cube);

// subtle wireframe overlay for a "corrupted data" feel
const wireGeo = new THREE.BoxGeometry(1.62, 1.62, 1.62);
const wireMat = new THREE.MeshBasicMaterial({ color:0x8a1f1f, wireframe:true, transparent:true, opacity:0.15 });
const wireCube = new THREE.Mesh(wireGeo, wireMat);
scene.add(wireCube);

function animate(){
  requestAnimationFrame(animate);
  cube.rotation.x += 0.006;
  cube.rotation.y += 0.009;
  wireCube.rotation.copy(cube.rotation);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ---------------- Glitch background text ---------------- */
const words = ['unknown','error','404','void','null','undefined','forbidden','???'];
const bgLayer = document.getElementById('bg-layer');

function spawnGlitchWord(){
  const el = document.createElement('div');
  el.className = 'glitch-word';
  el.textContent = words[Math.floor(Math.random()*words.length)];
  const size = 1 + Math.random()*4.5;
  el.style.fontSize = size + 'rem';
  el.style.left = Math.random()*90 + 'vw';
  el.style.top = Math.random()*90 + 'vh';
  bgLayer.appendChild(el);

  const tl = gsap.timeline({
    onComplete: () => el.remove()
  });

  tl.to(el, { opacity: 0.5 + Math.random()*0.3, duration:0.05 })
    .to(el, { x: (Math.random()-0.5)*30, duration:0.06, repeat:5, yoyo:true })
    .to(el, { opacity:0, duration:0.4, delay:0.2 });
}

setInterval(spawnGlitchWord, 450);

// occasional full-screen flash glitch
function screenFlash(){
  gsap.fromTo('#scanlines', { opacity:0.25 }, { opacity:0.06, duration:0.3 });
  gsap.to('#scene-container', {
    x: (Math.random()-0.5)*10,
    duration:0.05,
    repeat:3,
    yoyo:true,
    onComplete: () => gsap.set('#scene-container', { x:0 })
  });
}
setInterval(screenFlash, 3000 + Math.random()*3000);

// intro fade in
gsap.from('header.top', { opacity:0, y:-20, duration:1.2, ease:'power2.out' });
gsap.from('#countdown-wrap', { opacity:0, y:20, duration:1.2, delay:0.3, ease:'power2.out' });
gsap.from('footer.bottom', { opacity:0, y:20, duration:1.2, delay:0.6, ease:'power2.out' });

/* ---------------- Countdown ---------------- */
const target = new Date('2027-06-01T00:00:00');
const dEl = document.getElementById('d');
const hEl = document.getElementById('h');
const mEl = document.getElementById('m');
const sEl = document.getElementById('s');
const revealBtn = document.getElementById('reveal-btn');

function pad(n){ return String(n).padStart(2,'0'); }

function updateCountdown(){
  const now = new Date();
  const diff = target - now;

  if (diff <= 0){
    dEl.textContent = '00';
    hEl.textContent = '00';
    mEl.textContent = '00';
    sEl.textContent = '00';
    revealBtn.style.display = 'inline-block';
    return;
  }

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const mins = Math.floor((diff / (1000*60)) % 60);
  const secs = Math.floor((diff / 1000) % 60);

  dEl.textContent = pad(days);
  hEl.textContent = pad(hours);
  mEl.textContent = pad(mins);
  sEl.textContent = pad(secs);
}
updateCountdown();
setInterval(updateCountdown, 1000);

revealBtn.addEventListener('click', () => {
  window.location.href = 'ooo.html';
});

/* ---------------- Password gate ---------------- */
const pwForm = document.getElementById('pw-form');
const pwInput = document.getElementById('pw-input');
const pwMsg = document.getElementById('pw-msg');

pwForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const val = pwInput.value.trim().toLowerCase();
  if (val === 'test'){
    pwMsg.textContent = 'ACCESS GRANTED';
    gsap.to('#hud', { opacity:0, duration:0.6, onComplete: () => {
      window.location.href = 'ooo.html';
    }});
  } else {
    pwMsg.textContent = 'ACCESS DENIED';
    gsap.fromTo(pwForm, { x:-8 }, { x:0, duration:0.4, ease:'elastic.out(1,0.3)' });
    setTimeout(() => { pwMsg.textContent = ''; }, 1500);
  }
});
</script>
</body>
</html>
